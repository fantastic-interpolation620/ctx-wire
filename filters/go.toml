[filters.go]
description = "Compact go test/build/vet output"
match_command = "^go\\s+(test|build|vet)\\b"
strip_ansi = true
match_output = [
  { pattern = "(?m)^(ok\\s|\\?\\s|PASS$)", message = "go: ok", unless = "(?m)(^FAIL|panic:|undefined:|vet:|error:)" },
]
strip_lines_matching = [
  "^\\s*$",
  # `go test -v` prints these per-test even when one package fails, so they swamp
  # the few failure lines an agent needs. Anchored to the exact markers, so a test
  # named "RUN"/"PASS" or a log line is never stripped. Failures use `--- FAIL:`
  # (kept), as do panics, `t.Log` lines, and the trailing FAIL summary.
  "^=== RUN\\s+",
  "^=== PAUSE\\s+",
  "^=== CONT\\s+",
  "^\\s*--- PASS:\\s+",
  "^\\s*--- SKIP:\\s+",
]
max_lines = 140
on_empty = "go: ok"

[[tests.go]]
name = "test success collapses"
input = """
ok  	example.com/app	0.123s
?   	example.com/app/cmd	[no test files]
"""
expected = "go: ok"

[[tests.go]]
name = "failure preserved"
input = """
--- FAIL: TestThing (0.00s)
    thing_test.go:10: got false
FAIL
"""
expected = "--- FAIL: TestThing (0.00s)\n    thing_test.go:10: got false\nFAIL"

[[tests.go]]
name = "failed exit is not collapsed to a 'go: ok' summary"
failed = true
input = "ok  \texample/pkg\t0.12s"
expected = "ok  \texample/pkg\t0.12s"

[[tests.go]]
name = "verbose partial failure: passing noise stripped, failure block kept"
failed = true
input = """
=== RUN   TestPassA
--- PASS: TestPassA (0.00s)
=== RUN   TestPassB
--- PASS: TestPassB (0.00s)
=== RUN   TestFailC
    x_test.go:5: boom: got false
--- FAIL: TestFailC (0.00s)
FAIL
FAIL\tx\t0.379s
FAIL
"""
expected = "    x_test.go:5: boom: got false\n--- FAIL: TestFailC (0.00s)\nFAIL\nFAIL\tx\t0.379s\nFAIL"
